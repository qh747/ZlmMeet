<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZLMeet 会议 · 业务选择</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page">
  <main class="home-wrap">
    <div class="home-shell">
      <div class="home-top">
        <img src="assets/banner.svg" alt="ZLMeetkit" class="home-banner" />
      </div>
      <div class="home-body">
        <h1 class="home-title">
          <span class="home-title-brand">ZLMeet 会议</span>
          <span class="home-title-sep" aria-hidden="true"></span>
          <span class="home-title-sub">业务选择</span>
        </h1>
        <div class="shell-title-divider" aria-hidden="true"></div>

      <section class="home-grid">
        <button class="home-card" data-biz="meeting">
          <span class="card-tag">01</span>
          <div class="card-icon" aria-hidden="true">👥</div>
          <div class="card-body">
            <div class="card-title">多人会议</div>
            <div class="card-desc">多人加入同一房间，互相音视频通话</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </button>
        <button class="home-card" data-biz="call">
          <span class="card-tag">02</span>
          <div class="card-icon" aria-hidden="true">📞</div>
          <div class="card-body">
            <div class="card-title">1v1 通话</div>
            <div class="card-desc">两人专属房间，自动限制最多两人</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </button>
        <button class="home-card" data-biz="push">
          <span class="card-tag">03</span>
          <div class="card-icon" aria-hidden="true">📤</div>
          <div class="card-body">
            <div class="card-title">推流</div>
            <div class="card-desc">把本机摄像头推送到 ZLM 媒体服务器</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </button>
        <button class="home-card" data-biz="play">
          <span class="card-tag">04</span>
          <div class="card-icon" aria-hidden="true">📥</div>
          <div class="card-body">
            <div class="card-title">拉流</div>
            <div class="card-desc">输入房间号与流名，从 ZLM 拉取并播放</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </button>
      </section>
      </div>
    </div>

    <dialog id="formDialog" class="home-dialog">
      <form id="bizForm" autocomplete="off">
        <h2 id="formTitle">加入</h2>
        <div class="form-row form-row-primary" data-field="room">
          <label>
            <span id="roomLabel">房间号</span>
            <input id="room" type="text" maxlength="64" placeholder="比如 1001" />
          </label>
        </div>
        <div class="form-row form-row-primary" data-field="nickname">
          <label>
            <span id="nicknameLabel">成员名称</span>
            <input id="nickname" type="text" maxlength="32" placeholder="比如 Alice" />
          </label>
        </div>
        <div class="form-row form-row-primary" data-field="stream">
          <label>
            <span id="streamLabel">流名称</span>
            <input id="streamId" type="text" maxlength="128" placeholder="比如 demo_001" />
          </label>
        </div>
        <div class="form-row form-row-primary" data-field="token">
          <label>
            <span>令牌</span>
            <input id="accessToken" type="text" maxlength="128" placeholder="请输入业务令牌" autocomplete="off" />
          </label>
        </div>
        <div class="form-row form-row-media" data-field="media">
          <div class="media-bar">
            <div class="media-checks">
              <label class="check-label">
                <input id="enableMic" type="checkbox" checked />
                <span>启用麦克风</span>
              </label>
              <label class="check-label">
                <input id="enableCam" type="checkbox" checked />
                <span>启用摄像头</span>
              </label>
            </div>
            <label class="quality-inline">
              <span>分辨率：</span>
              <select id="videoQuality">
                <option value="smooth">流畅</option>
                <option value="standard">标清</option>
                <option value="hd" selected>高清</option>
              </select>
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="formCancel" class="ghost">取消</button>
          <button type="submit" class="primary">进入</button>
        </div>
      </form>
    </dialog>
  </main>

  <script type="module">
    import { showAppAlert, showTokenErrorAlert, isTokenError } from './js/ui-alert.js';
    import { getStoredQuality, setStoredQuality } from './js/quality.js';

    const dialog = document.getElementById('formDialog');
    const form = document.getElementById('bizForm');
    const title = document.getElementById('formTitle');
    const roomLabel = document.getElementById('roomLabel');
    const nicknameLabel = document.getElementById('nicknameLabel');
    const streamLabel = document.getElementById('streamLabel');
    const fields = {
      room: form.querySelector('[data-field="room"]'),
      nickname: form.querySelector('[data-field="nickname"]'),
      stream: form.querySelector('[data-field="stream"]'),
      token: form.querySelector('[data-field="token"]'),
      media: form.querySelector('[data-field="media"]'),
    };
    const inputs = {
      token: document.getElementById('accessToken'),
      nickname: document.getElementById('nickname'),
      room: document.getElementById('room'),
      stream: document.getElementById('streamId'),
      mic: document.getElementById('enableMic'),
      cam: document.getElementById('enableCam'),
      quality: document.getElementById('videoQuality'),
    };

    const SAVED_TOKEN = sessionStorage.getItem('zlm.token') || '';
    if (SAVED_TOKEN) inputs.token.value = SAVED_TOKEN;
    const SAVED_NAME = sessionStorage.getItem('zlm.nickname') || '';
    if (SAVED_NAME) inputs.nickname.value = SAVED_NAME;
    const SAVED_ROOM = sessionStorage.getItem('zlm.room') || '';
    if (SAVED_ROOM) inputs.room.value = SAVED_ROOM;
    inputs.mic.checked = sessionStorage.getItem('zlm.micOn') !== 'false';
    inputs.cam.checked = sessionStorage.getItem('zlm.camOn') !== 'false';
    inputs.quality.value = getStoredQuality();

    function syncQualitySelectState() {
      inputs.quality.disabled = !inputs.cam.checked;
    }
    inputs.cam.addEventListener('change', syncQualitySelectState);
    syncQualitySelectState();

    let currentBiz = null;

    function showFields(map) {
      for (const key of Object.keys(fields)) {
        fields[key].style.display = map[key] ? '' : 'none';
      }
      inputs.nickname.required = !!map.nickname;
      inputs.room.required = !!map.room;
      inputs.stream.required = !!map.stream;
    }

    function openBiz(biz) {
      currentBiz = biz;
      switch (biz) {
        case 'meeting':
          title.textContent = '加入多人会议';
          roomLabel.textContent = '房间号';
          nicknameLabel.textContent = '成员名称';
          streamLabel.textContent = '流名称';
          showFields({ room: true, nickname: true, stream: false, token: true, media: true });
          inputs.nickname.placeholder = '比如 Alice';
          inputs.room.placeholder = '比如 1001';
          break;
        case 'call':
          title.textContent = '加入 1v1 通话';
          roomLabel.textContent = '房间号';
          nicknameLabel.textContent = '成员名称';
          streamLabel.textContent = '流名称';
          showFields({ room: true, nickname: true, stream: false, token: true, media: true });
          inputs.nickname.placeholder = '比如 Alice';
          inputs.room.placeholder = '比如 alice-bob';
          break;
        case 'push':
          title.textContent = '推流';
          roomLabel.textContent = '房间号';
          streamLabel.textContent = '流名称';
          showFields({ room: true, nickname: false, stream: true, token: true, media: true });
          inputs.room.placeholder = '比如 live';
          inputs.stream.placeholder = '比如 demo_001';
          if (!inputs.stream.value) inputs.stream.value = 'pub_' + Date.now();
          break;
        case 'play':
          title.textContent = '拉流';
          roomLabel.textContent = '房间号';
          nicknameLabel.textContent = '成员名称';
          streamLabel.textContent = '流名称';
          showFields({ room: true, nickname: true, stream: true, token: true, media: false });
          inputs.nickname.placeholder = '比如 观众甲';
          inputs.room.placeholder = '比如 live';
          inputs.stream.placeholder = '比如 demo_001';
          break;
        default:
          nicknameLabel.textContent = '成员名称';
          inputs.nickname.placeholder = '比如 Alice';
          break;
      }
      syncQualitySelectState();
      if (typeof dialog.showModal === 'function') {
        dialog.showModal();
      } else {
        dialog.setAttribute('open', '');
      }
    }

    document.querySelectorAll('.home-card').forEach((btn) => {
      btn.addEventListener('click', () => openBiz(btn.dataset.biz));
    });
    document.getElementById('formCancel').addEventListener('click', () => {
      dialog.close();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nickname = inputs.nickname.value.trim();
      const room = inputs.room.value.trim();
      const stream = inputs.stream.value.trim();
      const token = inputs.token.value.trim();

      if (currentBiz === 'meeting' || currentBiz === 'call') {
        if (!nickname || !room) return;
      } else if (currentBiz === 'play') {
        if (!nickname || !room) return;
        if (!isSafeStream(stream)) {
          await showAppAlert('流名只能包含字母、数字、下划线、连字符或点', { title: '格式错误' });
          return;
        }
      } else if (currentBiz === 'push') {
        if (!room) return;
        if (!isSafeStream(stream)) {
          await showAppAlert('流名只能包含字母、数字、下划线、连字符或点', { title: '格式错误' });
          return;
        }
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      try {
        const resp = await fetch('/api/entry-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            biz: currentBiz,
            room,
            nickname: nickname || undefined,
            streamId: stream || undefined,
            token: token || undefined,
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data.ok) {
          if (isTokenError(data.message)) {
            await showTokenErrorAlert();
          } else {
            await showAppAlert(data.message || '无法进入，请稍后重试', { title: '无法进入' });
          }
          return;
        }
      } catch (_) {
        await showAppAlert('无法连接信令服务，请确认服务已启动', { title: '连接失败' });
        return;
      } finally {
        submitBtn.disabled = false;
      }

      sessionStorage.setItem('zlm.token', token);

      if (currentBiz === 'meeting' || currentBiz === 'call' || currentBiz === 'push') {
        sessionStorage.setItem('zlm.micOn', inputs.mic.checked ? 'true' : 'false');
        sessionStorage.setItem('zlm.camOn', inputs.cam.checked ? 'true' : 'false');
        setStoredQuality(inputs.quality.value);
      }

      if (currentBiz === 'meeting' || currentBiz === 'call') {
        sessionStorage.setItem('zlm.nickname', nickname);
        sessionStorage.setItem('zlm.room', room);
        location.href = currentBiz === 'meeting' ? 'meeting.html' : 'call.html';
      } else if (currentBiz === 'push' || currentBiz === 'play') {
        sessionStorage.setItem('zlm.room', room);
        sessionStorage.setItem('zlm.streamId', stream);
        if (currentBiz === 'play') {
          sessionStorage.setItem('zlm.nickname', nickname);
        }
        location.href = currentBiz === 'push' ? 'push.html' : 'play.html';
      }
    });

    function isSafeStream(s) {
      return /^[A-Za-z0-9_.\-]{1,128}$/.test(s);
    }

    const params = new URLSearchParams(location.search);
    const biz = params.get('biz');
    if (biz && ['meeting', 'call', 'push', 'play'].includes(biz)) {
      openBiz(biz);
    }
  </script>
</body>
</html>
