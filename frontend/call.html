<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1v1 通话</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="meeting-page" data-mode="call">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand-link">
        <span class="biz-tag">1v1 通话</span>
      </span>
    </div>
    <span class="topbar-center brand-link">
      <img src="assets/banner-mini.svg" alt="ZLMeetkit" class="topbar-banner" />
    </span>
    <div class="topbar-chips">
      <span class="info-chip"><span class="chip-key">通话编号</span><span class="chip-val" id="roomName">-</span></span>
      <span class="info-chip"><span class="chip-key">我</span><span class="chip-val" id="myName">-</span></span>
    </div>
  </header>

  <main class="stage">
    <section id="videoGrid" class="video-grid">
      <!-- Tiles appended dynamically -->
    </section>

    <aside id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <span>聊天</span>
        <button id="chatClose" class="icon-btn" title="关闭">×</button>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <input id="chatInput" type="text" placeholder="说点什么…" maxlength="500" autocomplete="off" />
        <button type="submit" class="primary">发送</button>
      </form>
    </aside>
  </main>

  <footer class="toolbar">
    <button id="btnMic" class="toolbar-btn" title="麦克风">🎤<span class="label">麦克风</span></button>
    <button id="btnCam" class="toolbar-btn" title="摄像头">📹<span class="label">摄像头</span></button>
    <button id="btnQuality" class="toolbar-btn" title="画质">🎬<span class="label">高清</span></button>
    <button id="btnRecord" class="toolbar-btn" title="录制">⏺️<span class="label">录制</span></button>
    <button id="btnChat" class="toolbar-btn" title="聊天">💬<span class="label">聊天</span></button>
    <button id="btnLeave" class="toolbar-btn danger" title="挂断">⛔<span class="label">挂断</span></button>
  </footer>

  <div id="statusBar" class="status-bar hidden"></div>

  <!-- Recording preview overlay -->
  <div id="previewOverlay" class="preview-overlay hidden">
    <div class="preview-box">
      <div class="preview-header">
        <span id="previewTitle">录制预览</span>
        <button id="previewClose" class="preview-close" title="关闭预览">&times;</button>
      </div>
      <video id="previewVideo" class="preview-video" controls playsinline></video>
      <div class="preview-actions">
        <button id="previewDownload" class="toolbar-btn" title="下载到本地">⬇️<span class="label">下载</span></button>
        <button id="previewCloseBtn" class="toolbar-btn danger" title="关闭">✕<span class="label">关闭</span></button>
      </div>
    </div>
  </div>

  <!-- Quality settings -->
  <dialog id="qualityDialog" class="quality-dialog">
    <h2>画质设置</h2>
    <div class="quality-options">
      <button type="button" class="quality-option" data-quality="smooth">流畅<span class="quality-desc">426×240</span></button>
      <button type="button" class="quality-option" data-quality="standard">标清<span class="quality-desc">640×480</span></button>
      <button type="button" class="quality-option" data-quality="hd">高清<span class="quality-desc">1280×720</span></button>
    </div>
    <button type="button" id="qualityClose" class="ghost">关闭</button>
  </dialog>
  <dialog id="qualityFailDialog" class="quality-dialog quality-fail">
    <h2>设置失败</h2>
    <p id="qualityFailMsg">请先打开摄像头后再切换画质</p>
    <button type="button" id="qualityFailOk" class="primary">确定</button>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
