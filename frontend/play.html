<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拉流 · ZLM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="solo-page">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand-link">
        <span class="biz-tag biz-tag-play">拉流</span>
      </span>
    </div>
    <span class="topbar-center brand-link">
      <img src="assets/banner-mini.svg" alt="ZLMeetkit" class="topbar-banner" />
    </span>
    <div class="topbar-chips">
      <span class="info-chip"><span class="chip-key">流</span><span class="chip-val" id="streamLabel">-</span></span>
      <span class="info-chip"><span class="chip-key">成员</span><span class="chip-val" id="memberName">-</span></span>
      <span class="info-chip status-chip" id="streamStateChip"><span class="status-dot"></span><span class="chip-val" id="streamState">未开始</span></span>
    </div>
  </header>

  <main class="solo-stage">
    <div class="solo-video-wrap">
      <div class="solo-tile">
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>

    <section class="solo-info">
      <div><strong>房间：</strong><span id="appName">-</span></div>
      <div><strong>流名：</strong><span id="streamNameInfo">-</span></div>
      <div><strong>成员：</strong><span id="memberNameInfo">-</span></div>
      <div class="hint">点击「开始拉流」从 ZLM 拉取并播放。请确保对应的流当前正在推送。</div>
    </section>

    <aside id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <span>聊天</span>
        <button id="chatClose" class="icon-btn" title="关闭">×</button>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <input id="chatInput" type="text" placeholder="说点什么…" maxlength="500" autocomplete="off" />
        <button type="submit" class="primary">发送</button>
      </form>
    </aside>
  </main>
